{{ define "main" }}
<div class="page-hero">
  <h1 class="page-hero__title">{{ .Title }}</h1>
  {{ with .Params.subtitle }}<p class="page-hero__subtitle">{{ . }}</p>{{ end }}
</div>
<div class="reading-width section">
  {{ .Content }}

  <div class="gold-rule"></div>

  <h2>Table of Contents</h2>
  <ol class="chapter-list">
    {{ range (where .Pages "Section" "book").ByWeight }}
    <li class="chapter-item">
      <a href="{{ .RelPermalink }}" class="chapter-item__link">
        <span class="chapter-item__num">{{ with .Params.chapter_num }}{{ . }}{{ end }}</span>
        <span class="chapter-item__title">{{ .Title }}</span>
      </a>
    </li>
    {{ end }}
  </ol>
</div>
{{ end }}
