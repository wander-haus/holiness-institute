<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found — The Holiness Institute</title>
  <meta name="robots" content="noindex">
  <!-- This page is fully self-contained: GitHub Pages serves 404.html for
       missing URLs at any depth, so relative asset paths cannot be trusted. -->
  <style>
    body {
      margin: 0;
      background: #faf6ee;
      color: #2b2b27;
      font-family: Georgia, 'Times New Roman', serif;
      display: grid;
      min-height: 100vh;
      place-items: center;
      text-align: center;
      padding: 2rem;
      box-sizing: border-box;
    }
    .rule { width: 3rem; border: 0; border-top: 1px solid #b08d3e; margin: 1.5rem auto; }
    blockquote {
      font-style: italic;
      font-size: 1.35rem;
      line-height: 1.5;
      color: #1b2a4a;
      max-width: 32rem;
      margin: 0 auto 0.5rem;
    }
    cite {
      font-style: normal;
      font-variant: small-caps;
      letter-spacing: 0.1em;
      font-size: 0.95rem;
      color: #7d6326;
    }
    p { font-size: 1.1rem; }
    a { color: #1b2a4a; text-decoration-color: #b08d3e; text-underline-offset: 3px; }
    h1 {
      font-variant: small-caps;
      letter-spacing: 0.18em;
      font-weight: 500;
      font-size: 1.05rem;
      color: #7d6326;
      margin: 0 0 1.25rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Page Not Found</h1>
    <blockquote>“What man of you, having a hundred sheep, if he has lost one of them, does not leave the ninety-nine in the wilderness, and go after the one which is lost, until he finds it?”</blockquote>
    <cite>(Lk 15:4)</cite>
    <hr class="rule">
    <p>The page you were looking for is not here.</p>
    <p><a id="home-link" href="index.html">Return to the beginning</a></p>
  </main>
  <script>
    // For nested missing URLs, point home at the site base. The first path
    // segment is the base on GitHub Pages project sites and on subpath
    // deployments (e.g. wander.haus/holiness-institute/), but not on a
    // custom domain serving from the root — so verify by probing a known
    // asset, and fall back to "/" if the guessed base isn't really the site.
    var parts = location.pathname.split('/').filter(Boolean);
    if (parts.length > 1) {
      var link = document.getElementById('home-link');
      var base = '/' + parts[0] + '/';
      link.href = base;
      var probe = new Image();
      probe.onerror = function () { link.href = '/'; };
      probe.src = base + 'assets/favicon-32.png';
    }
  </script>
</body>
</html>
